apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pyroscope-aws-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: pyroscope
      targetRevision: 2.0.3
      helm:
        releaseName: pyroscope
        valueFiles:
          - $values/platform/observability/pyroscope/values/aws-dev.yaml
    - repoURL: https://github.com/Medikong/gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        app.kubernetes.io/name: observability
        app.kubernetes.io/part-of: medikong
        medikong.io/platform: observability
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
