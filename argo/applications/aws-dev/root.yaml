apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: medikong-aws-dev-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Medikong/gitops.git
    targetRevision: HEAD
    path: argo/applications/aws-dev
    directory:
      recurse: true
      exclude: root.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
