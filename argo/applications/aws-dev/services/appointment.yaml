apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: appointment-aws-dev
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/Medikong/gitops.git
      targetRevision: HEAD
      path: charts/medikong-service
      helm:
        releaseName: appointment-aws-dev
        valueFiles:
          - $values/values/base.yaml
          - $values/values/env/aws-dev.yaml
          - $values/values/services/appointment.yaml
    - repoURL: https://github.com/Medikong/gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: medical-appointment
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
