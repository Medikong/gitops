loadtest:
  scenario: service-hpa-spike-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: service-hpa-spike-default

scaleOutReport:
  enabled: true
  pollEveryIterations: 5
  rbac:
    create: true
  targets:
    - service: auth-service
      namespace: ticketing-auth

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-half-year-early-growth-v2
  concerts: 270
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 20
  seatsPerRow: 35
  customerPool:
    size: 100000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-half-year-early-growth-v2

manualRuns:
  dataset:
    activeDeadlineSeconds: 7200
  read:
    activeDeadlineSeconds: 1800

reportArchive:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

scenarios:
  serviceHpaSpike:
    requestPrefix: loadtest-service-hpa-spike
    timeoutSeconds: 10
    setupTimeout: 10m
    preAllocatedVUs: 100
    maxVUs: 300
    serviceSteps:
      - auth
    stages:
      - duration: 30s
        target: 1
        stageRole: warmup
      - duration: 60s
        target: 10
        stageRole: baseline
      - duration: 60s
        target: 20
        stageRole: spike
      - duration: 60s
        target: 30
        stageRole: overload
      - duration: 60s
        target: 10
        stageRole: cooldown
    serviceStages: {}
    gracefulStop: 15s
    activeCustomerCount: 200
    concertLimit: 20
    performanceLimit: 20
    seatLimit: 200
    calendarYearMonth: "2026-07"
    performanceDate: "2026-07-01"
    ticketListLimit: 20
    paymentAmount: 50000
    ticketIssuePoolCount: 170000
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    fixedConditions:
      hpa: "enabled"
      minReplicas: "1"
      maxReplicas: "4"
      targetCPUUtilization: "70"
      cooldownInterpretation: recovery_observation_only
    seedRowCounts:
      customer_count: 100000
      provider_count: 1
      admin_count: 1
      concert_count: 270
      performance_count: 810
      seat_count: 567000
      seat_grade_count: 3240
      reservation_history_count: 261000
      payment_pool_count: 184000
      payment_count: 184000
      payment_event_count: 184000
      ticket_issue_pool_count: 170000
      ticket_count: 170000
      notification_count: 354000
    endpointSloP95Ms:
      capacity_baseline.auth.login: 300
      capacity_baseline.concert.recommended: 80
      capacity_baseline.concert.detail: 80
      capacity_baseline.concert.calendar: 80
      capacity_baseline.concert.date_performances: 80
      capacity_baseline.concert.seat_map: 150
      capacity_baseline.reservation.create: 120
      capacity_baseline.payment.create: 120
      capacity_baseline.ticket.issue: 120
      capacity_baseline.ticket.list: 100
      capacity_baseline.notification.list: 80
    resourceObservation:
      enabled: true
      source: metrics-api
      prometheusUrl: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
      queryWindow: 1m
      pollEveryIterations: 5
      rbac:
        create: true
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "150"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"
