loadtest:
  scenario: capacity-baseline-load-test
  credentialsSecretName: read-api-loadtest-credentials

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-v1
  concerts: 8
  performancesPerConcert: 2
  seatSections: 1
  seatRows: 10
  seatsPerRow: 50
  customerPool:
    size: 120
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-v1

manualRuns:
  dataset:
    activeDeadlineSeconds: 1800
  read:
    activeDeadlineSeconds: 1800

scenarios:
  capacityBaseline:
    requestPrefix: loadtest-capacity-baseline
    timeoutSeconds: 10
    setupTimeout: 5m
    vus: 5
    rate: 1
    timeUnit: 1s
    preAllocatedVUs: 20
    maxVUs: 50
    duration: 1m
    stages:
      - duration: 20s
        target: 1
      - duration: 20s
        target: 2
    serviceStages: {}
    gracefulStop: 10s
    activeCustomerCount: 20
    concertLimit: 20
    performanceLimit: 20
    seatLimit: 100
    ticketListLimit: 20
    paymentAmount: 50000
    paymentPoolCount: 8000
    ticketsPerCustomer: 20
    notificationsPerCustomer: 20
    targetUtilization: "0.70"
    seedMethod: deterministic_bulk_insert
    seedRowCounts:
      customer_count: 120
      provider_count: 1
      admin_count: 1
      concert_count: 8
      performance_count: 16
      seat_count: 8000
      payment_pool_count: 8000
      ticket_count: 2400
      notification_count: 2400
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "100"
      httpReqDurationP99Ms: "300"
      checksRate: "0.99"
