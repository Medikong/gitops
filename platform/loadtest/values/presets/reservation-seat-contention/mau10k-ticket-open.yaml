loadtest:
  scenario: reservation-seat-contention-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: mau10k-ticket-open
  mau: 10000
  stickiness: "0.20"
  peakParticipationRate: "0.30"
  peakWindowMinutes: 10
  journeysPerUser: 1
  safetyFactor: 2
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 2
  expectedJourneys: 1200

dataset:
  profile: reservation-seat-contention
  revision: reservation-contention-v1
  concerts: 1
  performancesPerConcert: 1
  seatSections: 1
  seatRows: 1
  seatsPerRow: 20
  customerPool:
    size: 100
    revision: reservation-contention-v1

scenarios:
  reservationSeatContention:
    requestPrefix: loadtest-reservation-contention
    executor: constant-arrival-rate
    rate: 2
    timeUnit: 1s
    preAllocatedVUs: 50
    maxVUs: 120
    duration: 10m
    stages: []
    thinkTimeSeconds: 0
    activeCustomerCount: 100
    maxSeatAttempts: 1
    concertLimit: 10
    performanceLimit: 10
    seatLimit: 20
    seatCandidateCount: 5
    thresholds:
      httpReqFailedRate: "0.05"
      httpReqDurationP95Ms: "1000"
      httpReqDurationP99Ms: "2000"
      checksRate: "0.95"
      handledRate: "0.95"
      createdRate: "0.0001"
      infraFailureRate: "0.01"
