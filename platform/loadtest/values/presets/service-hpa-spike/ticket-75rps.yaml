loadtest:
  scenario: service-hpa-spike-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: ticket-75rps

scaleOutReport:
  enabled: true
  pollEveryIterations: 5
  rbac:
    create: true
  targets:
    - service: ticket-service
      namespace: ticketing-ticket

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-half-year-early-growth-v2
  concerts: 270
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 20
  seatsPerRow: 35
  customerPool:
    size: 100000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-half-year-early-growth-v2

manualRuns:
  dataset:
    activeDeadlineSeconds: 7200
  read:
    activeDeadlineSeconds: 1800

reportArchive:
  enabled: true
  size: 2Gi

scenarios:
  serviceHpaSpike:
    requestPrefix: loadtest-service-hpa-spike-ticket
    preAllocatedVUs: 200
    maxVUs: 600
    activeCustomerCount: 200
    serviceSteps:
      - ticket
    stages:
      - duration: 30s
        target: 20
        stageRole: warmup
      - duration: 60s
        target: 40
        stageRole: baseline
      - duration: 60s
        target: 60
        stageRole: spike
      - duration: 60s
        target: 75
        stageRole: overload
      - duration: 60s
        target: 40
        stageRole: cooldown
