loadtest:
  scenario: service-hpa-spike-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: auth-30rps

scaleOutReport:
  enabled: true
  pollEveryIterations: 5
  rbac:
    create: true
  targets:
    - service: auth-service
      namespace: ticketing-auth

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-half-year-early-growth-v2
  concerts: 270
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 20
  seatsPerRow: 35
  customerPool:
    size: 100000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-half-year-early-growth-v2

manualRuns:
  dataset:
    activeDeadlineSeconds: 7200
  read:
    activeDeadlineSeconds: 1800

reportArchive:
  enabled: true
  size: 2Gi

scenarios:
  serviceHpaSpike:
    requestPrefix: loadtest-service-hpa-spike-auth
    preAllocatedVUs: 100
    maxVUs: 300
    serviceSteps:
      - auth
    stages:
      - duration: 30s
        target: 5
        stageRole: warmup
      - duration: 60s
        target: 15
        stageRole: baseline
      - duration: 60s
        target: 25
        stageRole: spike
      - duration: 60s
        target: 30
        stageRole: overload
      - duration: 60s
        target: 15
        stageRole: cooldown
