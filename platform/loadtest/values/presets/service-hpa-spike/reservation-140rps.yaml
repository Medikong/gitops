loadtest:
  scenario: service-hpa-spike-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: reservation-140rps

scaleOutReport:
  enabled: true
  pollEveryIterations: 5
  rbac:
    create: true
  targets:
    - service: reservation-service
      namespace: ticketing-reservation

dataset:
  scenario: setup-capacity-baseline-dataset
  profile: capacity-baseline
  revision: capacity-baseline-half-year-early-growth-v2
  concerts: 270
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 20
  seatsPerRow: 35
  customerPool:
    size: 100000
    emailPrefix: capacity-customer
    emailDomain: loadtest.medikong.local
    password: loadtest1234
    revision: capacity-baseline-half-year-early-growth-v2

manualRuns:
  dataset:
    activeDeadlineSeconds: 7200
  read:
    activeDeadlineSeconds: 1800

reportArchive:
  enabled: true
  size: 2Gi

scenarios:
  serviceHpaSpike:
    requestPrefix: loadtest-service-hpa-spike-reservation
    preAllocatedVUs: 400
    maxVUs: 1000
    activeCustomerCount: 200
    serviceSteps:
      - reservation
    stages:
      - duration: 30s
        target: 20
        stageRole: warmup
      - duration: 60s
        target: 80
        stageRole: baseline
      - duration: 60s
        target: 120
        stageRole: spike
      - duration: 60s
        target: 140
        stageRole: overload
      - duration: 60s
        target: 80
        stageRole: cooldown
