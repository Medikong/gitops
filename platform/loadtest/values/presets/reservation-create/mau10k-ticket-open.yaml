loadtest:
  scenario: reservation-create-load-test
  credentialsSecretName: read-api-loadtest-credentials

trafficModel:
  preset: mau10k-ticket-open
  mau: 10000
  stickiness: "0.20"
  peakParticipationRate: "0.30"
  peakWindowMinutes: 10
  journeysPerUser: 1
  safetyFactor: 2
  targetTicketsPerCustomer: 100
  calculatedJourneyRate: 2
  expectedJourneys: 1200

dataset:
  profile: reservation-create
  revision: reservation-create-v1
  concerts: 20
  performancesPerConcert: 3
  seatSections: 1
  seatRows: 10
  seatsPerRow: 30
  customerPool:
    size: 100
    revision: reservation-create-v1

scenarios:
  reservationCreate:
    requestPrefix: loadtest-reservation-create
    executor: constant-arrival-rate
    rate: 2
    timeUnit: 1s
    preAllocatedVUs: 50
    maxVUs: 100
    duration: 5m
    stages: []
    thinkTimeSeconds: 0
    activeCustomerCount: 100
    maxSeatAttempts: 3
    concertLimit: 100
    performanceLimit: 100
    seatLimit: 300
    seatCandidateCount: 300
    thresholds:
      httpReqFailedRate: "0.01"
      httpReqDurationP95Ms: "750"
      httpReqDurationP99Ms: "1500"
      checksRate: "0.99"
      handledRate: "0.99"
      createdRate: "0.99"
      infraFailureRate: "0.01"
