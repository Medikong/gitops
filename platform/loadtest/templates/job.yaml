{{- $datasetRunId := default "" .Values.manualRuns.dataset.runId -}}
{{- $datasetEnabled := or .Values.manualRuns.dataset.enabled (ne $datasetRunId "") -}}
{{- $readRunId := default "" .Values.manualRuns.read.runId -}}
{{- $readEnabled := or .Values.manualRuns.read.enabled (ne $readRunId "") -}}
{{- if $datasetEnabled }}
{{- $runId := required "manualRuns.dataset.runId is required when manualRuns.dataset.enabled is true" $datasetRunId -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-dataset-%s" (include "read-api-loadtest.fullname" .) $runId | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  annotations:
    argocd.argoproj.io/hook: {{ .Values.manualRuns.dataset.hook | quote }}
    argocd.argoproj.io/hook-delete-policy: {{ .Values.manualRuns.dataset.hookDeletePolicy | quote }}
    argocd.argoproj.io/sync-wave: {{ .Values.manualRuns.dataset.hookWeight | quote }}
  labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.dataset.scenario) | indent 4 }}
    medikong.io/execution: gitops-manual
spec:
  activeDeadlineSeconds: {{ .Values.manualRuns.dataset.activeDeadlineSeconds }}
  backoffLimit: {{ .Values.manualRuns.dataset.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.manualRuns.dataset.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.dataset.scenario) | indent 8 }}
        app.kubernetes.io/component: k6-runner
        medikong.io/execution: gitops-manual
        medikong.io/phase: dataset-setup
    spec:
{{ include "read-api-loadtest.podSpec" (dict "root" . "scenario" .Values.dataset.scenario "credentialsSecretName" .Values.dataset.credentialsSecretName) | indent 6 }}
{{- end }}
{{- if and $datasetEnabled $readEnabled }}
---
{{- end }}
{{- if $readEnabled }}
{{- $runId := required "manualRuns.read.runId is required when manualRuns.read.enabled is true" $readRunId -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-read-%s" (include "read-api-loadtest.fullname" .) $runId | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "read-api-loadtest.namespace" . | quote }}
  annotations:
    argocd.argoproj.io/hook: {{ .Values.manualRuns.read.hook | quote }}
    argocd.argoproj.io/hook-delete-policy: {{ .Values.manualRuns.read.hookDeletePolicy | quote }}
    argocd.argoproj.io/sync-wave: {{ .Values.manualRuns.read.hookWeight | quote }}
  labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.loadtest.scenario) | indent 4 }}
    medikong.io/execution: gitops-manual
spec:
  activeDeadlineSeconds: {{ .Values.manualRuns.read.activeDeadlineSeconds }}
  backoffLimit: {{ .Values.manualRuns.read.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.manualRuns.read.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
{{ include "read-api-loadtest.labelsForScenario" (dict "root" . "scenario" .Values.loadtest.scenario) | indent 8 }}
        app.kubernetes.io/component: k6-runner
        medikong.io/phase: loadtest
        medikong.io/execution: gitops-manual
    spec:
{{ include "read-api-loadtest.podSpec" (dict "root" . "scenario" .Values.loadtest.scenario "credentialsSecretName" .Values.loadtest.credentialsSecretName) | indent 6 }}
{{- end }}
