fullnameOverride: metrics-server

containerPort: 4443

hostNetwork:
  enabled: true

defaultArgs:
  - --cert-dir=/tmp
  - --secure-port=4443
  - --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP
  - --kubelet-use-node-status-port
  - --metric-resolution=15s
  - --kubelet-insecure-tls

updateStrategy:
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 1

livenessProbe:
  initialDelaySeconds: 20
  timeoutSeconds: 5

readinessProbe:
  initialDelaySeconds: 30
  timeoutSeconds: 5

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 150m
    memory: 128Mi

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node.kubernetes.io/not-ready
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 300
  - key: node.kubernetes.io/unreachable
    operator: Exists
    effect: NoExecute
    tolerationSeconds: 300
