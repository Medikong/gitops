apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-refresher
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ecr-secret-refresher
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "delete", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ecr-secret-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ecr-secret-refresher
subjects:
- kind: ServiceAccount
  name: ecr-secret-refresher
  namespace: kube-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresher
  namespace: kube-system
spec:
  schedule: "0 */10 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ecr-secret-refresher
          containers:
          - name: ecr-secret-refresher
            image: amazon/aws-cli:latest
            env:
            - name: AWS_REGION
              value: ap-northeast-2
            - name: ECR_REGISTRY
              value: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
            command:
            - /bin/sh
            - -c
            - |
              ECR_PASSWORD=$(aws ecr get-login-password --region ${AWS_REGION})
              for ns in ticketing-auth ticketing-concert ticketing-reservation ticketing-payment ticketing-ticket ticketing-notification ticketing-dashboard; do
                kubectl delete secret ecr-registry -n ${ns} --ignore-not-found
                kubectl create secret docker-registry ecr-registry                   --docker-server=${ECR_REGISTRY}                   --docker-username=AWS                   --docker-password=${ECR_PASSWORD}                   -n ${ns}
              done
          restartPolicy: OnFailure
