name: Kubernetes Security Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: k8s-security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-config:
    name: Trivy config scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Kubernetes and GitOps manifests
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
      - name: Discord 보안 스캔 알림
        if: failure()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_SECURITY_CRITICAL_WEBHOOK }}
          status: failure
          title: "🚨 K8s 보안 취약점 발견"
          description: "K8s 매니페스트에서 HIGH/CRITICAL 취약점이 발견되었습니다."
          color: 0xff0000
