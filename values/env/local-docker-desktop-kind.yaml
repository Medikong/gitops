environment: local-docker-desktop-kind

image:
  registry: kind-registry:5000
  pullPolicy: IfNotPresent

deployment:
  replicas: 1

container:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

observability:
  profiling:
    enabled: true
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
    sampleRate: 100

pdb:
  enabled: false

hpa:
  enabled: false

serviceMonitor:
  enabled: false
