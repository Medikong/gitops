environment: aws-dev

image:
  registry: 941141115079.dkr.ecr.ap-northeast-2.amazonaws.com
  pullPolicy: Always

imagePullSecrets:
  - name: ecr-registry

deployment:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1

container:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

serviceMonitor:
  enabled: true
