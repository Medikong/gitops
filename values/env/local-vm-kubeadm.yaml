environment: local-vm-kubeadm

image:
  registry: 10.10.10.10:5000
  pullPolicy: IfNotPresent

deployment:
  replicas: 1

container:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

observability:
  tracing:
    enabled: true
    otlpEndpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
    excludedUrls: /health,/healthz,/readyz,/metrics
  profiling:
    enabled: true
    serverAddress: http://pyroscope.observability.svc.cluster.local:4040
    sampleRate: 25
    spanProfilesEnabled: true

pdb:
  enabled: false

hpa:
  enabled: false

serviceMonitor:
  enabled: false
